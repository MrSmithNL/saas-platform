name: Staging Deploy

on:
  push:
    branches: [staging]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check & Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.STAGING_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.STAGING_CLERK_SECRET_KEY }}

      - name: Run tests
        run: pnpm test

      - name: Deploy to Vercel (staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          alias-domains: staging.sellfunnel.app

      - name: Run database migrations
        run: pnpm db:push
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Smoke test staging
        run: |
          STAGING_URL="${{ secrets.STAGING_URL || 'https://staging.sellfunnel.app' }}"
          echo "Smoke testing $STAGING_URL..."

          # Wait for deployment to be ready (max 60s)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging is live! (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for staging... (attempt $i, HTTP $STATUS)"
            sleep 5
          done

          echo "WARNING: Staging may not be fully ready (last HTTP status: $STATUS)"
          # Don't fail — deployment may still be propagating
