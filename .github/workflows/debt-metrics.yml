name: Weekly Debt Metrics

# Tracks complexity, duplication, and dead code trends over time.
# Runs weekly and on-demand. Appends metrics to docs/debt-metrics.md.

on:
  schedule:
    - cron: '0 5 * * 1'  # Every Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-metrics:
    name: Collect Debt Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect duplication metrics
        id: duplication
        run: |
          npx jscpd packages/ apps/ --reporters json --output .jscpd-report --ignore "node_modules,dist,.next,.turbo,coverage" 2>/dev/null || true
          DUP=$(cat .jscpd-report/jscpd-report.json 2>/dev/null | node -e "const d=require('./.jscpd-report/jscpd-report.json'); console.log((d.statistics?.total?.percentage || 0).toFixed(1))" 2>/dev/null || echo "0.0")
          echo "duplication=${DUP}" >> "$GITHUB_OUTPUT"

      - name: Collect dead export count
        id: deadcode
        run: |
          npx knip --no-exit-code --reporter compact 2>/dev/null | wc -l | tr -d ' ' > /tmp/knip_count
          DEAD=$(cat /tmp/knip_count)
          echo "dead_exports=${DEAD}" >> "$GITHUB_OUTPUT"

      - name: Count open debt issues
        id: debt_issues
        run: |
          COUNT=$(gh issue list --label tech-debt --state open --json number --jq length 2>/dev/null || echo "0")
          echo "open_debt=${COUNT}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append metrics to log
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p docs
          if [ ! -f docs/debt-metrics.md ]; then
            echo "# Debt Metrics — Weekly Trend" > docs/debt-metrics.md
            echo "" >> docs/debt-metrics.md
            echo "| Date | Duplication % | Dead Exports | Open Debt Issues |" >> docs/debt-metrics.md
            echo "|------|---------------|--------------|-----------------|" >> docs/debt-metrics.md
          fi
          echo "| ${DATE} | ${{ steps.duplication.outputs.duplication }}% | ${{ steps.deadcode.outputs.dead_exports }} | ${{ steps.debt_issues.outputs.open_debt }} |" >> docs/debt-metrics.md

      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/debt-metrics.md
          git diff --cached --quiet || git commit -m "metrics: weekly debt metrics $(date +%Y-%m-%d)"
          git push
