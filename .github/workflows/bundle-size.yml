name: Bundle Size Tracking

on:
  pull_request:
    branches: [main]

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Report Next.js bundle sizes
        run: |
          echo "## Bundle Size Report" > bundle-report.md
          echo "" >> bundle-report.md

          for app_dir in apps/*/; do
            app_name=$(basename "$app_dir")
            next_dir="${app_dir}.next"

            if [ ! -d "$next_dir" ]; then
              echo "Skipping $app_name — no .next directory"
              continue
            fi

            echo "### $app_name" >> bundle-report.md

            # Get total JS bundle size
            if [ -d "${next_dir}/static" ]; then
              TOTAL_JS=$(find "${next_dir}/static" -name "*.js" -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1 || echo 0)
              TOTAL_JS_KB=$((TOTAL_JS / 1024))
              echo "- Total JS: ${TOTAL_JS_KB} KB" >> bundle-report.md

              # Warn if total JS exceeds 500KB
              if [ "$TOTAL_JS_KB" -gt 500 ]; then
                echo "::warning::${app_name} JS bundle is ${TOTAL_JS_KB}KB (target: <500KB)"
              fi
            fi

            echo "" >> bundle-report.md
          done

          cat bundle-report.md

      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: bundle-report.md
          retention-days: 30
