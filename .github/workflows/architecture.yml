name: Architecture Fitness Functions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: architecture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fitness-functions:
    name: Architecture Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # FF-003 + FF-004: Dependency validation (circular deps, layer boundaries, direction)
      - name: "FF-003/004: Dependency Cruiser — layer boundaries & circular deps"
        run: npx depcruise --config .dependency-cruiser.mjs --output-type err packages/ apps/

      # FF-003: Circular dependency check (Madge)
      - name: "FF-003: Madge — circular dependency detection"
        run: |
          RESULT=$(npx madge --circular --extensions ts,tsx packages/ apps/ 2>&1 || true)
          echo "$RESULT"
          if echo "$RESULT" | grep -q "Found [1-9]"; then
            echo "::error::Circular dependencies detected"
            exit 1
          fi

      # FF-009: No hardcoded tenant IDs or UUIDs
      - name: "FF-009: No hardcoded tenant IDs or UUIDs"
        run: |
          FOUND=$(grep -r --include="*.ts" --include="*.tsx" \
            -E "tenant[_-]?id\s*[:=]\s*['\"][a-f0-9-]{8,}|['\"][0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}['\"]" \
            packages/ apps/ modules/ 2>/dev/null | \
            grep -v node_modules | \
            grep -v '.test.' | \
            grep -v '__tests__' | \
            grep -v '.spec.' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Hardcoded tenant IDs or UUIDs detected"
            echo "$FOUND"
            exit 1
          fi
          echo "No hardcoded tenant IDs found"

      # FF-013/FF-014 + all boundary tests: Vitest architecture fitness tests
      - name: "FF-013/014: Vitest architecture fitness tests (boundaries, manifests, isolation)"
        run: pnpm vitest run --config tooling/tests/vitest.arch.config.ts

      # FF-010: Approved dependency check
      - name: "FF-010: Dependency governance — approved list check"
        run: node tooling/scripts/check-dependencies.mjs

      # FF-008: File naming convention (kebab-case) — ERROR, grace period ended
      - name: "FF-008: File naming convention (kebab-case)"
        run: |
          BAD_FILES=$(find packages/ apps/ modules/ -name "*.ts" -o -name "*.tsx" | \
            grep -v node_modules | \
            grep -v '.d.ts' | \
            grep -v '__tests__' | \
            grep -v '.test.' | \
            grep -v '.spec.' | \
            grep -v '.config.' | \
            while read -r f; do
              BASE=$(basename "$f")
              # Skip Next.js conventions and index files
              case "$BASE" in
                index.*|middleware.*|layout.*|page.*|loading.*|error.*|not-found.*|global.*) continue ;;
              esac
              # Allow PascalCase for React components (.tsx only)
              if echo "$BASE" | grep -qE '\.tsx$' && echo "$BASE" | grep -qE '^[A-Z]'; then
                continue
              fi
              # Check for uppercase letters (not kebab-case)
              if echo "$BASE" | grep -qE '[A-Z]'; then
                echo "$f"
              fi
            done || true)
          if [ -n "$BAD_FILES" ]; then
            echo "::error::Files not following kebab-case naming convention:"
            echo "$BAD_FILES"
            exit 1
          fi
          echo "File naming check complete"

      # FF-015: Archgate executable ADR validation
      - name: "FF-015: Archgate — executable ADR checks"
        run: npx archgate check

      # FF-016: Secrets scan
      - name: "FF-016: Gitleaks — secrets detection"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
