site_name: "SaaS Platform (PROD-004)"
site_url: https://mrsmithnl.github.io/saas-platform/
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  homepage: https://mrsmithnl.github.io/smith-ai-agency/

plugins:
  - search
  - encryptcontent:
      global_password: !ENV [DOCS_PASSWORD, 'SmithAI2026!']
      search_index: encrypted
      remember_password: true
      session_storage: true

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Business Case: business-case.md
  - Roadmap: roadmap.md
  - Market Research: market-research.md
  - Strategic OS: strategic-os.md
  - Metrics: metrics.md
  - Processes & Flows: processes-and-flows.md
  - Decisions Log: decisions-log.md
  - Accounts & Access: accounts-and-access.md
  - Technical Architecture Plan: technical-architecture-plan.md
  - Security Risk Log: security-risk-log.md
  - Todo: todo.md
  - Operations:
    - Rollback Runbook: rollback-runbook.md
  - Development:
    - Specs:
      - "E-001 SellFunnel MVP": specs/E-001-sell-funnel-mvp/epic-status.md
    - Research:
      - SellFunnel Competitor Analysis: specs/research/sell-funnel-competitor-analysis.md
